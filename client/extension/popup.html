<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CastHub Instagram Extractor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Midnight Black */
      --background: hsl(30, 8%, 5%);
      --foreground: hsl(40, 20%, 95%);
      --card: hsl(30, 8%, 7%);
      --card-foreground: hsl(40, 20%, 95%);
      /* Cinematic Gold */
      --primary: hsl(43, 96%, 50%);
      --primary-foreground: hsl(30, 10%, 5%);
      --secondary: hsl(36, 100%, 48%);
      --secondary-foreground: hsl(30, 10%, 5%);
      --muted: hsl(30, 8%, 12%);
      --muted-foreground: hsl(40, 12%, 55%);
      --border: hsl(30, 8%, 16%);
      --radius: 0.75rem;
    }
    
    body {
      width: 320px;
      margin: 0;
      padding: 1.5rem;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      text-align: center;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 800;
      margin: 0 0 0.25rem 0;
      letter-spacing: 0.02em;
    }

    h1 span {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px hsla(43, 96%, 50%, 0.3);
    }

    p {
      font-size: 0.85rem;
      color: var(--muted-foreground);
      margin: 0;
      text-align: center;
      line-height: 1.4;
      font-weight: 500;
    }

    .status-box {
      background-color: var(--muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      font-size: 0.8rem;
      text-align: center;
      word-break: break-all;
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      color: var(--foreground);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }

    button {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      color: var(--primary-foreground);
      border: none;
      border-radius: var(--radius);
      padding: 0.875rem;
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      box-shadow: 0 4px 14px 0 hsla(43, 96%, 50%, 0.3);
      font-family: 'Poppins', sans-serif;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px 0 hsla(43, 96%, 50%, 0.4);
      filter: brightness(1.1);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 10px 0 hsla(43, 96%, 50%, 0.3);
    }

    button:disabled {
      background: var(--muted);
      color: var(--muted-foreground);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
      filter: none;
    }

    .footer {
      font-size: 0.7rem;
      text-align: center;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    
    .glass-effect {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CastHub <span>Extractor</span></h1>
    <p>Get your Instagram session ID securely for your local setup.</p>
  </div>

  <div class="status-box glass-effect" id="status">
    Ready to extract.
  </div>

  <button id="extractBtn">Extract & Copy Session</button>

  <div class="footer">
    End-to-End Encryption
  </div>

  <script src="popup.js"></script>
</body>
</html>
