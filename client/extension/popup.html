<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CastHub Instagram Extractor</title>
  <style>
    :root {
      --background: #09090b;
      --foreground: #fafafa;
      --primary: #ec4899; /* Pink 500 */
      --secondary: #8b5cf6; /* Purple 500 */
      --muted: #27272a;
      --border: #3f3f46;
    }
    
    body {
      width: 320px;
      margin: 0;
      padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 900;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    h1 span {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 0.85rem;
      color: #a1a1aa;
      margin: 0;
      text-align: center;
      line-height: 1.4;
    }

    .status-box {
      background-color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      font-size: 0.85rem;
      text-align: center;
      word-break: break-all;
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      color: #e4e4e7;
    }

    button {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.875rem;
      font-size: 0.875rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s;
      width: 100%;
      box-shadow: 0 4px 14px 0 rgba(236, 72, 153, 0.39);
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      background: var(--muted);
      color: #52525b;
      cursor: not-allowed;
      box-shadow: none;
    }

    .footer {
      font-size: 0.7rem;
      text-align: center;
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CastHub <span>Extractor</span></h1>
    <p>Get your Instagram session ID securely for your local setup.</p>
  </div>

  <div class="status-box" id="status">
    Ready to extract.
  </div>

  <button id="extractBtn">Extract & Copy Session</button>

  <div class="footer">
    End-to-End Encryption
  </div>

  <script src="popup.js"></script>
</body>
</html>
